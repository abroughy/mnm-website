<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Enquiry Sent — MNM Matt Norwood Maintenance</title>
  <link rel="icon" href="data:,">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/nav.css">

  <style>
    .thankyou {
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      background: var(--bg-primary);
    }

    .thankyou__inner {
      text-align: center;
      max-width: 520px;
    }

    .thankyou__icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(232, 147, 10, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.75rem;
    }

    .thankyou__icon svg {
      color: var(--accent);
    }

    .thankyou__heading {
      font-size: clamp(1.8rem, 5vw, 2.4rem);
      font-weight: 700;
      margin-bottom: 1rem;
      color: var(--text);
    }

    .thankyou__text {
      color: var(--text-muted);
      font-size: 1.05rem;
      line-height: 1.75;
      margin-bottom: 2rem;
    }

    .thankyou__actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .thankyou__back {
      display: inline-block;
      margin-top: 2rem;
      font-size: 0.9rem;
      color: var(--text-muted);
      transition: color 0.2s;
    }

    .thankyou__back:hover { color: var(--accent); }

    @media (max-width: 480px) {
      .thankyou__actions { flex-direction: column; }
      .thankyou__actions .btn { text-align: center; }
    }
  </style>
</head>
<body>

  <header id="nav">
    <nav class="nav scrolled">
      <div class="container nav__inner">
        <a href="index.html" class="nav__logo">
          <img src="images/logo.png" alt="MNM — Matt Norwood Maintenance" class="nav__logo-img" onerror="this.style.display='none';this.nextElementSibling.style.display='inline'">
          <span class="nav__logo-text" style="display:none">MNM</span>
        </a>
      </div>
    </nav>
  </header>

  <main class="thankyou">
    <div class="thankyou__inner">
      <div class="thankyou__icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <h1 class="thankyou__heading">Enquiry Sent!</h1>
      <p class="thankyou__text">
        Thanks for getting in touch. Matt will get back to you as soon as possible — usually within a few hours.
      </p>
      <p class="thankyou__text">
        If you need a quicker response you can also reach Matt directly:
      </p>
      <div class="thankyou__actions">
        <a href="tel:07969359683" class="btn btn-primary">Call 07969 359683</a>
        <a href="https://wa.me/447969359683" class="btn btn-outline" target="_blank" rel="noopener noreferrer">WhatsApp Matt</a>
      </div>
      <a href="index.html" class="thankyou__back">← Back to home</a>
    </div>
  </main>

  <script src="js/nav.js"></script>
</body>
</html>
